{% extends "base.html" %}
{% block title %}Yeni Gelir/Gider{% endblock %}
{% block page_title %}Yeni Gelir / Gider Girişi{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
    <div class="card-header">
        <h3 class="card-title">Muhasebe Kaydı</h3>
        <a href="{{ url_for('muhasebe.muhasebe_liste') }}" class="btn btn-ghost btn-sm">← Geri</a>
    </div>
    <form method="POST" style="padding:24px;">
        <div class="form-group">
            <label class="form-label">Tür *</label>
            <div style="display:flex;gap:12px;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;
                              padding:10px 20px;border:2px solid #e2e8f0;border-radius:8px;flex:1;
                              justify-content:center;" id="lbl-gelir">
                    <input type="radio" name="tur" value="gelir" checked
                           onchange="turDegisti('gelir')">
                    <span style="color:#22c55e;font-weight:600;">▲ GELİR</span>
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;
                              padding:10px 20px;border:2px solid #e2e8f0;border-radius:8px;flex:1;
                              justify-content:center;" id="lbl-gider">
                    <input type="radio" name="tur" value="gider"
                           onchange="turDegisti('gider')">
                    <span style="color:#ef4444;font-weight:600;">▼ GİDER</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Kategori</label>
            <select name="kategori" class="form-select" id="kategori-select">
                {% for k in gelir_kategoriler %}
                <option value="{{ k }}">{{ k }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Açıklama *</label>
            <input type="text" name="aciklama" class="form-input" required
                   placeholder="Örn: ABC Ltd. Mayıs faturası">
        </div>

        <div class="grid grid-2" style="gap:16px;">
            <div class="form-group">
                <label class="form-label">Tutar *</label>
                <input type="number" name="tutar" class="form-input"
                       step="0.01" min="0.01" required placeholder="0.00">
            </div>
            <div class="form-group">
                <label class="form-label">Para Birimi</label>
                <select name="para_birimi" class="form-select">
                    <option value="TL">TL</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Tarih *</label>
            <input type="text" name="tarih" class="datepicker form-input"
                   placeholder="GG.AA.YYYY" required>
        </div>

        <div class="form-group">
            <label class="form-label">Bağlı Proje (opsiyonel)</label>
            <select name="proje_id" class="form-select">
                <option value="">— Yok —</option>
                {% for p in projeler %}
                <option value="{{ p.id }}">{{ p.proje_no }} — {{ p.proje_adi }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="display:flex;gap:8px;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Kaydet
            </button>
            <a href="{{ url_for('muhasebe.muhasebe_liste') }}" class="btn btn-ghost">İptal</a>
        </div>
    </form>
</div>

<script>
const gelirKat = {{ gelir_kategoriler | tojson }};
const giderKat = {{ gider_kategoriler | tojson }};

function turDegisti(tur) {
    const sel = document.getElementById('kategori-select');
    const kategoriler = tur === 'gelir' ? gelirKat : giderKat;
    sel.innerHTML = kategoriler.map(k => `<option value="${k}">${k}</option>`).join('');
}
</script>
{% endblock %}
