<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris - ERP Sistemi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--siyah) 0%, var(--siyah-acik) 100%);
        }
        .giris-kutu {
            background: var(--siyah-acik);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--sari);
        }
        .giris-baslik {
            text-align: center;
            margin-bottom: 2rem;
        }
        .giris-baslik h1 {
            color: var(--sari);
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }
        .giris-baslik p {
            color: var(--gri);
            font-size: 0.9rem;
        }
        .giris-kutu .form-group {
            margin-bottom: 1.25rem;
        }
        .giris-kutu label {
            display: block;
            color: var(--gri-acik);
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .giris-kutu input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--siyah);
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .giris-kutu input:focus {
            outline: none;
            border-color: var(--sari);
        }
        .giris-btn {
            width: 100%;
            padding: 0.85rem;
            background: var(--sari);
            color: var(--siyah);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .giris-btn:hover {
            background: var(--sari-acik);
        }
        .alert { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 6px; }
        .alert-danger { background: rgba(231,76,60,0.2); border: 1px solid #e74c3c; color: #e74c3c; }
        .alert-info { background: rgba(52,152,219,0.2); border: 1px solid #3498db; color: #3498db; }
    </style>
</head>
<body>
    <div class="giris-kutu">
        <div class="giris-baslik">
            <h1>ERP</h1>
            <p>NANMAK Yonetim Sistemi</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="kullanici_adi">Kullanici Adi</label>
                <input type="text" id="kullanici_adi" name="kullanici_adi" required autofocus>
            </div>
            <div class="form-group">
                <label for="sifre">Sifre</label>
                <input type="password" id="sifre" name="sifre" required>
            </div>
            <button type="submit" class="giris-btn">Giris Yap</button>
        </form>
    </div>
</body>
</html>
