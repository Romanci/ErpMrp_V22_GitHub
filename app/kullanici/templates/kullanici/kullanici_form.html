{% extends "base.html" %}
{% block title %}{{ 'Kullanici Duzenle' if kullanici else 'Yeni Kullanici' }} - ERP{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Kullanici Duzenle' if kullanici else 'Yeni Kullanici' }}</h1>
    <a href="{{ url_for('kullanici.kullanici_liste') }}" class="btn btn-secondary">Listeye Don</a>
</div>

<form method="POST" class="form-container">
    <div class="form-row">
        <div class="form-group">
            <label for="kullanici_adi">Kullanici Adi *</label>
            <input type="text" id="kullanici_adi" name="kullanici_adi"
                   value="{{ kullanici.kullanici_adi if kullanici else '' }}"
                   {{ 'readonly' if kullanici else '' }} required>
            {% if kullanici %}<small style="color: var(--gri);">Kullanici adi degistirilemez</small>{% endif %}
        </div>
        <div class="form-group">
            <label for="sifre">Sifre {{ '' if kullanici else '*' }}</label>
            <input type="password" id="sifre" name="sifre"
                   placeholder="{{ '(Degistirmek icin doldurun)' if kullanici else '' }}"
                   {{ '' if kullanici else 'required' }}>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="ad">Ad *</label>
            <input type="text" id="ad" name="ad" value="{{ kullanici.ad if kullanici else '' }}" required>
        </div>
        <div class="form-group">
            <label for="soyad">Soyad *</label>
            <input type="text" id="soyad" name="soyad" value="{{ kullanici.soyad if kullanici else '' }}" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ kullanici.email if kullanici else '' }}">
        </div>
        <div class="form-group">
            <label for="telefon">Telefon</label>
            <input type="text" id="telefon" name="telefon" value="{{ kullanici.telefon if kullanici else '' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="departman">Departman</label>
            <select id="departman" name="departman">
                <option value="">Seciniz</option>
                {% for dep in ['Yonetim', 'Satin Alma', 'Uretim', 'Depo/Stok', 'Kalite', 'Bakim', 'Insan Kaynaklari', 'Muhasebe', 'BT'] %}
                <option value="{{ dep }}" {{ 'selected' if kullanici and kullanici.departman == dep else '' }}>{{ dep }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="rol_id">Rol *</label>
            <select id="rol_id" name="rol_id" required>
                <option value="">Seciniz</option>
                {% for rol in roller %}
                <option value="{{ rol.id }}" {{ 'selected' if mevcut_rol_id and mevcut_rol_id == rol.id else '' }}>
                    {{ rol.rol_adi }} — {{ rol.aciklama or '' }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Kaydet</button>
        <a href="{{ url_for('kullanici.kullanici_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>
{% endblock %}
