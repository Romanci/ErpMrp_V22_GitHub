<!-- Siparis olusturma formu -->
{% extends "base.html" %}

{% block title %}Yeni Siparis - ERP{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Yeni Satin Alma Siparisi</h1>
    <a href="{{ url_for('satin_alma_siparis.siparis_liste') }}" class="btn btn-secondary">Listeye Don</a>
</div>

<form method="POST" class="form-container">
    <div class="form-row">
        <div class="form-group">
            <label for="siparis_no">Siparis No *</label>
            <input type="text" id="siparis_no" name="siparis_no" required>
        </div>
        <div class="form-group">
            <label for="tedarikci_id">Tedarikci *</label>
            <select id="tedarikci_id" name="tedarikci_id" required>
                <option value="">Seciniz</option>
                {% for tedarikci in tedarikciler %}
                <option value="{{ tedarikci.id }}">{{ tedarikci.unvan }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="siparis_tarihi">Siparis Tarihi</label>
            <input class="datepicker" type="text" id="siparis_tarihi" name="siparis_tarihi" placeholder="GG.AA.YYYY">
        </div>
        <div class="form-group">
            <label for="teslim_tarihi">Teslim Tarihi</label>
            <input class="datepicker" type="text" id="teslim_tarihi" name="teslim_tarihi" placeholder="GG.AA.YYYY">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="para_birimi">Para Birimi</label>
            <select id="para_birimi" name="para_birimi">
                <option value="TL">TL</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="aciklama">Aciklama</label>
        <textarea id="aciklama" name="aciklama" rows="3"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Olustur</button>
        <a href="{{ url_for('satin_alma_siparis.siparis_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>
{% endblock %}
