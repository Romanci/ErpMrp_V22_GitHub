{% extends "base.html" %}
{% block title %}{{ 'Proje Düzenle' if proje.id else 'Yeni Proje' }}{% endblock %}
{% block page_title %}{{ 'Proje Düzenle' if proje.id else 'Yeni Proje' }}{% endblock %}
{% block content %}
<div class="card" style="max-width:800px;">
    <div class="card-header">
        <h3 class="card-title">Proje Bilgileri</h3>
        <a href="{{ url_for('proje.proje_dashboard') }}" class="btn btn-ghost btn-sm">← Geri</a>
    </div>
    <form method="POST" style="padding:24px;">
        <div class="grid grid-2" style="gap:16px;">
            <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label">Proje Adı *</label>
                <input type="text" name="proje_adi" class="form-input"
                       value="{{ proje.proje_adi or '' }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Müşteri (CRM'den)</label>
                <select name="musteri_id" class="form-select">
                    <option value="">— Seçiniz veya aşağıya yazınız —</option>
                    {% for m in musteriler %}
                    <option value="{{ m.id }}" {{ 'selected' if proje.musteri_id == m.id }}>
                        {{ m.unvan }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Müşteri Adı (CRM'de yoksa)</label>
                <input type="text" name="musteri_adi_serbest" class="form-input"
                       value="{{ proje.musteri_adi_serbest or '' }}"
                       placeholder="Müşteri sistemde yoksa buraya yazın">
            </div>

            <div class="form-group">
                <label class="form-label">Aşama</label>
                <select name="asama" class="form-select">
                    {% for asama_key, asama_label in asamalar %}
                    <option value="{{ asama_key }}"
                        {{ 'selected' if (proje.asama or 'teklif') == asama_key }}>
                        {{ asama_label }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Sorumlu Kişi</label>
                <select name="sorumlu_id" class="form-select">
                    <option value="">— Seçiniz —</option>
                    {% for k in kullanicilar %}
                    <option value="{{ k.id }}" {{ 'selected' if proje.sorumlu_id == k.id }}>
                        {{ k.ad }} {{ k.soyad }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Başlangıç Tarihi</label>
                <input type="text" name="baslangic_tarihi" class="datepicker form-input"
                       value="{{ proje.baslangic_tarihi or '' }}" placeholder="GG.AA.YYYY">
            </div>

            <div class="form-group">
                <label class="form-label">Planlanan Bitiş</label>
                <input type="text" name="bitis_tarihi" class="datepicker form-input"
                       value="{{ proje.bitis_tarihi or '' }}" placeholder="GG.AA.YYYY">
            </div>

            <div class="form-group">
                <label class="form-label">Planlanan Bütçe</label>
                <input type="number" step="0.01" name="planlanan_maliyet" class="form-input"
                       value="{{ proje.planlanan_maliyet or 0 }}">
            </div>

            <div class="form-group">
                <label class="form-label">Para Birimi</label>
                <select name="para_birimi" class="form-select">
                    <option value="TL"  {{ 'selected' if (proje.para_birimi or 'TL') == 'TL' }}>TL</option>
                    <option value="USD" {{ 'selected' if proje.para_birimi == 'USD' }}>USD</option>
                    <option value="EUR" {{ 'selected' if proje.para_birimi == 'EUR' }}>EUR</option>
                </select>
            </div>

            <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label">Açıklama</label>
                <textarea name="aciklama" class="form-input" rows="3">{{ proje.aciklama or '' }}</textarea>
            </div>
        </div>

        <div style="display:flex;gap:8px;margin-top:8px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Kaydet</button>
            <a href="{{ url_for('proje.proje_dashboard') }}" class="btn btn-ghost">İptal</a>
        </div>
    </form>
</div>
{% endblock %}
