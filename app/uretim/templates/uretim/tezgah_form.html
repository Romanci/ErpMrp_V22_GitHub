<!-- Tezgah ekleme/duzenleme formu -->
{% extends "base.html" %}

{% block title %}{{ 'Tezgah Duzenle' if tezgah else 'Yeni Tezgah' }} - ERP{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Tezgah Duzenle' if tezgah else 'Yeni Tezgah' }}</h1>
    <a href="{{ url_for('tezgah.tezgah_liste') }}" class="btn btn-secondary">Listeye Don</a>
</div>

<form method="POST" class="form-container">
    <div class="form-row">
        <div class="form-group">
            <label for="tezgah_kodu">Tezgah Kodu *</label>
            <input type="text" id="tezgah_kodu" name="tezgah_kodu" value="{{ tezgah.tezgah_kodu if tezgah else '' }}" required>
        </div>
        <div class="form-group">
            <label for="tezgah_adi">Tezgah Adi *</label>
            <input type="text" id="tezgah_adi" name="tezgah_adi" value="{{ tezgah.tezgah_adi if tezgah else '' }}" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="tezgah_tipi">Tezgah Tipi</label>
            <input type="text" id="tezgah_tipi" name="tezgah_tipi" value="{{ tezgah.tezgah_tipi if tezgah else '' }}" placeholder="CNC, Torna, Freze...">
        </div>
        <div class="form-group">
            <label for="lokasyon">Lokasyon</label>
            <input type="text" id="lokasyon" name="lokasyon" value="{{ tezgah.lokasyon if tezgah else '' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="marka">Marka</label>
            <input type="text" id="marka" name="marka" value="{{ tezgah.marka if tezgah else '' }}">
        </div>
        <div class="form-group">
            <label for="model">Model</label>
            <input type="text" id="model" name="model" value="{{ tezgah.model if tezgah else '' }}">
        </div>
        <div class="form-group">
            <label for="seri_no">Seri No</label>
            <input type="text" id="seri_no" name="seri_no" value="{{ tezgah.seri_no if tezgah else '' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="kapasite">Gunluk Kapasite (saat)</label>
            <input type="number" step="0.5" id="kapasite" name="kapasite" value="{{ tezgah.kapasite if tezgah else '8' }}">
        </div>
        <div class="form-group">
            <label for="verimlilik_orani">Verimlilik Orani (%)</label>
            <input type="number" id="verimlilik_orani" name="verimlilik_orani" value="{{ tezgah.verimlilik_orani if tezgah else '100' }}">
        </div>
        <div class="form-group">
            <label for="bakim_periyodu_gun">Bakim Periyodu (gun)</label>
            <input type="number" id="bakim_periyodu_gun" name="bakim_periyodu_gun" value="{{ tezgah.bakim_periyodu_gun if tezgah else '90' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="garanti_bitis">Garanti Bitis Tarihi</label>
            <input class="datepicker" type="text" id="garanti_bitis" name="garanti_bitis" placeholder="GG.AA.YYYY" value="{{ tezgah.garanti_bitis if tezgah else '' }}">
        </div>
        <div class="form-group">
            <label for="sonraki_bakim">Sonraki Bakim Tarihi</label>
            <input class="datepicker" type="text" id="sonraki_bakim" name="sonraki_bakim" placeholder="GG.AA.YYYY" value="{{ tezgah.sonraki_bakim if tezgah else '' }}">
        </div>
    </div>

    {% if tezgah %}
    <div class="form-group">
        <label for="durum">Durum</label>
        <select id="durum" name="durum">
            <option value="musait" {{ 'selected' if tezgah.durum == 'musait' else '' }}>Musait</option>
            <option value="calisiyor" {{ 'selected' if tezgah.durum == 'calisiyor' else '' }}>Calisiyor</option>
            <option value="bakim" {{ 'selected' if tezgah.durum == 'bakim' else '' }}>Bakimda</option>
            <option value="ariza" {{ 'selected' if tezgah.durum == 'ariza' else '' }}>Arizali</option>
        </select>
    </div>
    {% endif %}

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Kaydet</button>
        <a href="{{ url_for('tezgah.tezgah_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>
{% endblock %}
