<!-- BOM olusturma formu -->
{% extends "base.html" %}

{% block title %}Yeni BOM - ERP{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Yeni BOM (Urun Agaci)</h1>
    <a href="{{ url_for('bom.bom_liste') }}" class="btn btn-secondary">Listeye Don</a>
</div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="urun_id">Urun *</label>
        <select id="urun_id" name="urun_id" required>
            <option value="">Seciniz</option>
            {% for urun in urunler %}
            <option value="{{ urun.id }}">{{ urun.stok_kodu }} - {{ urun.urun_adi }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="versiyon">Versiyon</label>
            <input type="text" id="versiyon" name="versiyon" value="1.0">
        </div>
    </div>

    <div class="form-group">
        <label for="aciklama">Aciklama</label>
        <textarea id="aciklama" name="aciklama" rows="3"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Olustur</button>
        <a href="{{ url_for('bom.bom_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>
{% endblock %}
