{% extends "base.html" %}
{% block title %}Yeni Bakım Planı{% endblock %}
{% block page_title %}Yeni Bakım Planı{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">Bakım Planı Oluştur</h3>
        <a href="{{ url_for('bakim.bakim_plan_liste') }}" class="btn btn-ghost btn-sm">← Geri</a>
    </div>
    <form method="POST" style="padding:24px;max-width:600px;">
        <div class="form-group">
            <label class="form-label">Tezgah *</label>
            <select name="tezgah_id" class="form-select" required>
                <option value="">Seçiniz</option>
                {% for t in tezgahlar %}
                <option value="{{ t.id }}">{{ t.tezgah_adi }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Bakım Adı *</label>
            <input type="text" name="bakim_adi" class="form-input" required placeholder="Örn: Yağ değişimi, Filtre temizliği">
        </div>
        <div class="grid grid-2">
            <div class="form-group">
                <label class="form-label">Bakım Türü</label>
                <select name="bakim_turu" class="form-select">
                    <option value="periyodik">Periyodik</option>
                    <option value="mevsimlik">Mevsimlik</option>
                    <option value="yillik">Yıllık</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Periyot (gün)</label>
                <input type="number" name="periyot_gun" class="form-input" value="30" min="1">
            </div>
            <div class="form-group">
                <label class="form-label">Son Bakım Tarihi</label>
                <input type="text" name="son_bakim" class="datepicker form-input" placeholder="GG.AA.YYYY">
            </div>
            <div class="form-group">
                <label class="form-label">Tahmini Süre (dk)</label>
                <input type="number" name="tahmini_sure_dk" class="form-input" value="60">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Açıklama</label>
            <textarea name="aciklama" class="form-input" rows="3"></textarea>
        </div>
        <div style="display:flex;gap:8px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Kaydet</button>
            <a href="{{ url_for('bakim.bakim_plan_liste') }}" class="btn btn-ghost">İptal</a>
        </div>
    </form>
</div>
{% endblock %}
