{% extends "base.html" %}
{% block title %}Arıza Bildir{% endblock %}
{% block page_title %}Yeni Arıza Bildirimi{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">Arıza Bildir</h3>
        <a href="{{ url_for('bakim.ariza_liste') }}" class="btn btn-ghost btn-sm">← Geri</a>
    </div>
    <form method="POST" style="padding:24px;max-width:600px;">
        <div class="form-group">
            <label class="form-label">Tezgah *</label>
            <select name="tezgah_id" class="form-select" required>
                <option value="">Seçiniz</option>
                {% for t in tezgahlar %}
                <option value="{{ t.id }}">{{ t.tezgah_adi }} ({{ t.tezgah_kodu }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="grid grid-2">
            <div class="form-group">
                <label class="form-label">Arıza Tarihi</label>
                <input type="text" name="ariza_tarihi" class="datepicker form-input" placeholder="GG.AA.YYYY">
            </div>
            <div class="form-group">
                <label class="form-label">Öncelik</label>
                <select name="oncelik" class="form-select">
                    <option value="dusuk">Düşük</option>
                    <option value="normal" selected>Normal</option>
                    <option value="yuksek">Yüksek</option>
                    <option value="kritik">Kritik</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Arıza Açıklaması *</label>
            <textarea name="ariza_aciklama" class="form-input" rows="4" required
                      placeholder="Arızayı detaylı açıklayın..."></textarea>
        </div>
        <div style="display:flex;gap:8px;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Kaydet</button>
            <a href="{{ url_for('bakim.ariza_liste') }}" class="btn btn-ghost">İptal</a>
        </div>
    </form>
</div>
{% endblock %}
