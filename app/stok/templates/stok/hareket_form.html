<!-- Stok giris/cikis formu -->
{% extends "base.html" %}

{% block title %}{{ 'Stok Girisi' if hareket_tipi == 'giris' else 'Stok Cikisi' }} - ERP{% endblock %}

{% block content %}
{% block page_title %}{{ 'Stok Girisi' if hareket_tipi == 'giris' else 'Stok Cikisi' }}{% endblock %}
<div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><a href="{{ url_for('hareket.hareket_liste') }}" class="btn btn-secondary">Listeye Don</a></div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="urun_id">Urun *</label>
        <select id="urun_id" name="urun_id" required>
            <option value="">Seciniz</option>
            {% for urun in urunler %}
            <option value="{{ urun.id }}">{{ urun.stok_kodu }} - {{ urun.urun_adi }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="depo_id">Depo *</label>
        <select id="depo_id" name="depo_id" required onchange="lokasyonGetir(this.value, 'lokasyon_id')">
            <option value="">Seciniz</option>
            {% for depo in depolar %}
            <option value="{{ depo.id }}">{{ depo.depo_adi }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="lokasyon_id">Lokasyon</label>
        <select id="lokasyon_id" name="lokasyon_id">
            <option value="">Once depo secin</option>
        </select>
    </div>

    <div class="form-group">
        <label for="miktar">Miktar *</label>
        <input type="number" step="0.01" id="miktar" name="miktar" required>
    </div>

    <div class="form-group">
        <label for="birim_fiyat">Birim Fiyat</label>
        <input type="number" step="0.01" id="birim_fiyat" name="birim_fiyat">
    </div>

    <div class="form-group">
        <label for="referans_tipi">Referans Tipi</label>
        <select id="referans_tipi" name="referans_tipi">
            <option value="">Seciniz</option>
            <option value="siparis">Siparis</option>
            <option value="sayim">Sayim</option>
            <option value="fire">Fire</option>
            <option value="duzeltme">Duzeltme</option>
        </select>
    </div>

    <div class="form-group">
        <label for="aciklama">Aciklama</label>
        <textarea id="aciklama" name="aciklama" rows="3"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Kaydet</button>
        <a href="{{ url_for('hareket.hareket_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>

<script>
// Depo secilince lokasyonlari getir
function lokasyonGetir(depoId, lokasyonSelectId) {
    var select = document.getElementById(lokasyonSelectId);
    select.innerHTML = '<option value="">Yukleniyor...</option>';
    
    if (!depoId) {
        select.innerHTML = '<option value="">Once depo secin</option>';
        return;
    }
    
    fetch('/stok/api/depo/' + depoId + '/lokasyonlar')
        .then(response => response.json())
        .then(data => {
            select.innerHTML = '<option value="">Seciniz</option>';
            data.forEach(function(lok) {
                select.innerHTML += '<option value="' + lok.id + '">' + lok.lokasyon_kodu + '</option>';
            });
        });
}
</script>
{% endblock %}
