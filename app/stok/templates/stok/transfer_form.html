<!-- Stok transfer formu - depo degisimi -->
{% extends "base.html" %}

{% block title %}Stok Transfer - ERP{% endblock %}

{% block content %}
{% block page_title %}Stok Transfer{% endblock %}
<div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><a href="{{ url_for('hareket.hareket_liste') }}" class="btn btn-secondary">Listeye Don</a></div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="urun_id">Urun *</label>
        <select id="urun_id" name="urun_id" required>
            <option value="">Seciniz</option>
            {% for urun in urunler %}
            <option value="{{ urun.id }}">{{ urun.stok_kodu }} - {{ urun.urun_adi }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="kaynak_depo_id">Kaynak Depo *</label>
            <select id="kaynak_depo_id" name="kaynak_depo_id" required onchange="lokasyonGetir(this.value, 'kaynak_lokasyon_id')">
                <option value="">Seciniz</option>
                {% for depo in depolar %}
                <option value="{{ depo.id }}">{{ depo.depo_adi }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="hedef_depo_id">Hedef Depo *</label>
            <select id="hedef_depo_id" name="hedef_depo_id" required onchange="lokasyonGetir(this.value, 'hedef_lokasyon_id')">
                <option value="">Seciniz</option>
                {% for depo in depolar %}
                <option value="{{ depo.id }}">{{ depo.depo_adi }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="kaynak_lokasyon_id">Kaynak Lokasyon</label>
            <select id="kaynak_lokasyon_id" name="kaynak_lokasyon_id">
                <option value="">Once kaynak depo secin</option>
            </select>
        </div>

        <div class="form-group">
            <label for="hedef_lokasyon_id">Hedef Lokasyon</label>
            <select id="hedef_lokasyon_id" name="hedef_lokasyon_id">
                <option value="">Once hedef depo secin</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="miktar">Transfer Miktari *</label>
        <input type="number" step="0.01" id="miktar" name="miktar" required>
    </div>

    <div class="form-group">
        <label for="aciklama">Aciklama</label>
        <textarea id="aciklama" name="aciklama" rows="3"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Transfer Yap</button>
        <a href="{{ url_for('hareket.hareket_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>

<script>
function lokasyonGetir(depoId, selectId) {
    var select = document.getElementById(selectId);
    select.innerHTML = '<option value="">Yukleniyor...</option>';
    
    if (!depoId) {
        select.innerHTML = '<option value="">Once depo secin</option>';
        return;
    }
    
    fetch('/stok/api/depo/' + depoId + '/lokasyonlar')
        .then(r => r.json())
        .then(data => {
            select.innerHTML = '<option value="">Seciniz</option>';
            data.forEach(l => {
                select.innerHTML += '<option value="' + l.id + '">' + l.lokasyon_kodu + '</option>';
            });
        });
}
</script>
{% endblock %}
