<!-- Parti ekleme/duzenleme formu -->
{% extends "base.html" %}

{% block title %}{{ 'Parti Duzenle' if parti else 'Yeni Parti' }} - ERP{% endblock %}

{% block content %}
{% block page_title %}{{ 'Parti Duzenle' if parti else 'Yeni Parti' }}{% endblock %}
<div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><a href="{{ url_for('parti.parti_liste') }}" class="btn btn-secondary">Listeye Don</a></div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="urun_id">Urun *</label>
        <select id="urun_id" name="urun_id" required>
            <option value="">Seciniz</option>
            {% for urun in urunler %}
            <option value="{{ urun.id }}" {{ 'selected' if parti and parti.urun_id == urun.id else '' }}>
                {{ urun.stok_kodu }} - {{ urun.urun_adi }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="parti_kodu">Parti Kodu *</label>
        <input type="text" id="parti_kodu" name="parti_kodu" value="{{ parti.parti_kodu if parti else '' }}" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="uretim_tarihi">Uretim Tarihi</label>
            <input class="datepicker" type="text" id="uretim_tarihi" name="uretim_tarihi" placeholder="GG.AA.YYYY" value="{{ parti.uretim_tarihi if parti else '' }}">
        </div>

        <div class="form-group">
            <label for="son_kullanma_tarihi">Son Kullanma Tarihi</label>
            <input class="datepicker" type="text" id="son_kullanma_tarihi" name="son_kullanma_tarihi" placeholder="GG.AA.YYYY" value="{{ parti.son_kullanma_tarihi if parti else '' }}">
        </div>
    </div>

    <div class="form-group">
        <label for="miktar">Miktar</label>
        <input type="number" step="0.01" id="miktar" name="miktar" value="{{ parti.miktar if parti else '0' }}">
    </div>

    <div class="form-group">
        <label for="depo_id">Depo</label>
        <select id="depo_id" name="depo_id">
            <option value="">Seciniz</option>
            {% for depo in depolar %}
            <option value="{{ depo.id }}" {{ 'selected' if parti and parti.depo_id == depo.id else '' }}>
                {{ depo.depo_adi }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Kaydet</button>
        <a href="{{ url_for('parti.parti_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>
{% endblock %}
