<!-- Urun ekleme/duzenleme formu -->
{% extends "base.html" %}

{% block title %}{{ 'Urun Duzenle' if urun else 'Yeni Urun' }} - ERP{% endblock %}

{% block content %}
{% block page_title %}{{ 'Urun Duzenle' if urun else 'Yeni Urun' }}{% endblock %}
<div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><a href="{{ url_for('stok.urun_liste') }}" class="btn btn-secondary">Listeye Don</a></div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="stok_kodu">Stok Kodu *</label>
        <input type="text" id="stok_kodu" name="stok_kodu" value="{{ urun.stok_kodu if urun else '' }}" required>
    </div>

    <div class="form-group">
        <label for="barkod">Barkod</label>
        <input type="text" id="barkod" name="barkod" value="{{ urun.barkod if urun else '' }}">
    </div>

    <div class="form-group">
        <label for="urun_adi">Urun Adi *</label>
        <input type="text" id="urun_adi" name="urun_adi" value="{{ urun.urun_adi if urun else '' }}" required>
    </div>

    <div class="form-group">
        <label for="birim">Birim *</label>
        <select id="birim" name="birim" required>
            <option value="">Seciniz</option>
            <option value="adet" {{ 'selected' if urun and urun.birim == 'adet' else '' }}>Adet</option>
            <option value="kg" {{ 'selected' if urun and urun.birim == 'kg' else '' }}>Kilogram</option>
            <option value="mt" {{ 'selected' if urun and urun.birim == 'mt' else '' }}>Metre</option>
            <option value="koli" {{ 'selected' if urun and urun.birim == 'koli' else '' }}>Koli</option>
            <option value="lt" {{ 'selected' if urun and urun.birim == 'lt' else '' }}>Litre</option>
        </select>
    </div>

    <div class="form-group">
        <label for="kategori_id">Kategori</label>
        <select id="kategori_id" name="kategori_id">
            <option value="">Seciniz</option>
            {% for kategori in kategoriler %}
            <option value="{{ kategori.id }}" {{ 'selected' if urun and urun.kategori_id == kategori.id else '' }}>
                {{ kategori.kategori_adi }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="min_stok">Min Stok</label>
            <input type="number" step="0.01" id="min_stok" name="min_stok" value="{{ urun.min_stok if urun else '0' }}">
        </div>

        <div class="form-group">
            <label for="max_stok">Max Stok</label>
            <input type="number" step="0.01" id="max_stok" name="max_stok" value="{{ urun.max_stok if urun else '0' }}">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="alis_fiyati">Alis Fiyati</label>
            <input type="number" step="0.01" id="alis_fiyati" name="alis_fiyati" value="{{ urun.alis_fiyati if urun else '0' }}">
        </div>
        <div class="form-group">
            <label for="satis_fiyati">Satis Fiyati</label>
            <input type="number" step="0.01" id="satis_fiyati" name="satis_fiyati" value="{{ urun.satis_fiyati if urun else '0' }}">
        </div>
        <div class="form-group">
            <label for="kdv_orani">KDV Orani (%)</label>
            <select id="kdv_orani" name="kdv_orani">
                <option value="0" {{ 'selected' if urun and urun.kdv_orani == 0 else '' }}>%0</option>
                <option value="10" {{ 'selected' if urun and urun.kdv_orani == 10 else '' }}>%10</option>
                <option value="20" {{ 'selected' if urun and (urun.kdv_orani == 20 or not urun.kdv_orani) else 'selected' if not urun else '' }}>%20</option>
            </select>
        </div>
    </div>

    <div class="form-group checkbox-group">
        <label>
            <input type="checkbox" name="parti_takibi" value="1" {{ 'checked' if urun and urun.parti_takibi else '' }}>
            Parti/Seri Takibi Yapilsin
        </label>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Kaydet</button>
        <a href="{{ url_for('stok.urun_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>
{% endblock %}
