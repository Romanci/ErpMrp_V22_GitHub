<!-- Sayim baslatma formu -->
{% extends "base.html" %}

{% block title %}Yeni Sayim - ERP{% endblock %}

{% block content %}
{% block page_title %}Yeni Sayim Baslat{% endblock %}
<div style="display:flex;justify-content:flex-end;margin-bottom:8px;"><a href="{{ url_for('sayim.sayim_liste') }}" class="btn btn-secondary">Listeye Don</a></div>

<form method="POST" class="form-container">
    <div class="form-group">
        <label for="depo_id">Depo *</label>
        <select id="depo_id" name="depo_id" required>
            <option value="">Seciniz</option>
            {% for depo in depolar %}
            <option value="{{ depo.id }}">{{ depo.depo_adi }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="sayim_tarihi">Sayim Tarihi *</label>
        <input class="datepicker" type="text" id="sayim_tarihi" name="sayim_tarihi" placeholder="GG.AA.YYYY" required>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Baslat</button>
        <a href="{{ url_for('sayim.sayim_liste') }}" class="btn btn-secondary">Iptal</a>
    </div>
</form>
{% endblock %}
